name: Start portfolio demo

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: Hours before the dashboard stops automatically
        required: true
        default: "2"
        type: choice
        options: ["1", "2", "3", "4"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: portfolio-demo-control
  cancel-in-progress: false

jobs:
  start:
    name: Start two-hour demo
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: portfolio-demo-${{ github.run_id }}
      - name: Start dashboard and schedule automatic stop
        id: demo
        shell: bash
        run: |
          STACK=OrFleetOptimizationStack
          CLUSTER=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='ClusterName'].OutputValue" --output text)
          SERVICE=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='ServiceName'].OutputValue" --output text)
          URL=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='OptimizerPublicDashboardUrl'].OutputValue" --output text)
          STOP_FUNCTION=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='PortfolioStopFunctionArn'].OutputValue" --output text)
          SCHEDULER_ROLE=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='PortfolioSchedulerRoleArn'].OutputValue" --output text)

          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" --desired-count 1 >/dev/null
          STOP_AT=$(date -u -d "+${{ inputs.duration_hours }} hours" +'%Y-%m-%dT%H:%M:%S')
          aws scheduler create-schedule \
            --name "or-fleet-demo-stop-${GITHUB_RUN_ID}" \
            --schedule-expression "at(${STOP_AT})" \
            --schedule-expression-timezone UTC \
            --flexible-time-window '{"Mode":"OFF"}' \
            --action-after-completion DELETE \
            --target "{\"Arn\":\"${STOP_FUNCTION}\",\"RoleArn\":\"${SCHEDULER_ROLE}\",\"Input\":\"{}\"}" >/dev/null

          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "stop-at=${STOP_AT} UTC" >> "$GITHUB_OUTPUT"
      - name: Demo link
        run: |
          echo "### Portfolio demo is online" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.demo.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Automatic stop: ${{ steps.demo.outputs.stop-at }}" >> "$GITHUB_STEP_SUMMARY"
