name: Continuous integration

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint
        run: ruff check src tests infra scripts
      - name: Test
        run: pytest -q
      - name: Validate container build
        run: docker build --pull --tag or-fleet-optimizer:ci .

  synthesize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install CDK dependencies
        run: |
          python -m pip install -r infra/requirements.txt
          npm install --global aws-cdk@2.176.0
      - name: Synthesize CloudFormation
        working-directory: infra
        run: cdk synth --quiet
