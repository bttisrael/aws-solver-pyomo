name: Deploy production

on:
  workflow_run:
    workflows: [Continuous integration]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-production-${{ github.run_id }}
      - name: Install deployment dependencies
        run: |
          python -m pip install -r requirements.txt -r requirements-dev.txt -r infra/requirements.txt
          npm install --global aws-cdk@2.176.0
      - name: Deploy build infrastructure and upload source
        working-directory: infra
        run: >-
          cdk deploy OptimizerBuildStack
          --require-approval never
          --context account=${AWS_ACCOUNT_ID}
          --context region=${AWS_REGION}
      - name: Build, test, and publish image in CodeBuild
        id: codebuild
        shell: bash
        run: |
          BUILD_ID=$(aws codebuild start-build \
            --project-name or-fleet-optimizer-image-build \
            --query 'build.id' --output text)
          echo "build-id=${BUILD_ID}" >> "$GITHUB_OUTPUT"
          while true; do
            STATUS=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
              --query 'builds[0].buildStatus' --output text)
            echo "CodeBuild status: ${STATUS}"
            case "$STATUS" in
              SUCCEEDED) break ;;
              FAILED|FAULT|STOPPED|TIMED_OUT) exit 1 ;;
            esac
            sleep 15
          done
      - name: Deploy immutable image to ECS
        working-directory: infra
        run: >-
          cdk deploy OrFleetOptimizationStack
          --require-approval never
          --context account=${AWS_ACCOUNT_ID}
          --context region=${AWS_REGION}
      - name: Wait for ECS and load-balancer health
        shell: bash
        run: |
          CLUSTER=$(aws cloudformation describe-stacks --stack-name OrFleetOptimizationStack \
            --query "Stacks[0].Outputs[?OutputKey=='ClusterName'].OutputValue" --output text)
          SERVICE=$(aws cloudformation describe-stacks --stack-name OrFleetOptimizationStack \
            --query "Stacks[0].Outputs[?OutputKey=='ServiceName'].OutputValue" --output text)
          TARGET_GROUP=$(aws cloudformation describe-stacks --stack-name OrFleetOptimizationStack \
            --query "Stacks[0].Outputs[?OutputKey=='TargetGroupArn'].OutputValue" --output text)
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"
          HEALTH=$(aws elbv2 describe-target-health --target-group-arn "$TARGET_GROUP" \
            --query 'TargetHealthDescriptions[].TargetHealth.State' --output text)
          echo "Target health: ${HEALTH}"
          test -n "$HEALTH"
          test "${HEALTH//healthy/}" = ""
      - name: Deployment summary
        if: always()
        run: |
          echo "### Production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${DEPLOY_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- CodeBuild: \`${{ steps.codebuild.outputs.build-id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Region: \`${AWS_REGION}\`" >> "$GITHUB_STEP_SUMMARY"
